server:
  port: 0
spring:
  application:
    name: favorito-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bd_favoritos}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  sql:
    init:
      mode: always
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8901/eureka/}
    register-with-eureka: true
    fetch-registry: true
logging:
  level:
    org:
      flywaydb: DEBUG
      springframework:
        jdbc: DEBUG
        orm:
          jpa: DEBUG
springdoc:
  swagger-ui:
    path: /swagger-ui.html